version: '3.8'

networks:
  sopes-network:
    driver: bridge

services:
  valkey:
    image: valkey/valkey:latest
    container_name: valkey-sopes
    ports:
      - "6379:6379"
    networks:
      - sopes-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-sopes
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_LOG_LEVEL=warn
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - sopes-network
    depends_on:
      - valkey
    restart: unless-stopped

volumes:
  grafana-storage:
